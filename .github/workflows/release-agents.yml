name: Release Agents

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.3.0 or v0.3.0)"
        required: true
        type: string
      create_release:
        description: "Create/update GitHub release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-agents-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows agent artifacts
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "Failed to read tag from github.ref_name"
            }
            $version = $tag
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }
          else {
            $raw = "${{ inputs.version }}"
            if ([string]::IsNullOrWhiteSpace($raw)) {
              throw "workflow_dispatch requires the version input"
            }

            $normalized = $raw.Trim()
            if ($normalized.StartsWith("v")) {
              $tag = $normalized
              $version = $normalized.Substring(1)
            }
            else {
              $tag = "v$normalized"
              $version = $normalized
            }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Resolved version is empty"
          }

          "tag_name=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.meta.outputs.version }}"

          New-Item -ItemType Directory -Path release -Force | Out-Null

          $targets = @(
            @{ Module = "agent"; Cmd = "agent"; Output = "cordyceps-agent.exe" },
            @{ Module = "t1"; Cmd = "t1"; Output = "t1-agent.exe" },
            @{ Module = "s1"; Cmd = "s1"; Output = "s1-agent.exe" },
            @{ Module = "e1"; Cmd = "e1"; Output = "e1-agent.exe" },
            @{ Module = "se1"; Cmd = "se1"; Output = "se1-agent.exe" },
            @{ Module = "a1"; Cmd = "a1"; Output = "a1-agent.exe" }
          )

          foreach ($target in $targets) {
            Write-Host "Building $($target.Output)"
            Push-Location $target.Module
            try {
              $ldflags = "-X main.defaultVersion=$version"
              go build -trimpath -ldflags $ldflags -o "..\\release\\$($target.Output)" ".\\cmd\\$($target.Cmd)"
            }
            finally {
              Pop-Location
            }
          }

      - name: Verify reported versions
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.meta.outputs.version }}"

          $binaries = @(
            "cordyceps-agent.exe",
            "t1-agent.exe",
            "s1-agent.exe",
            "e1-agent.exe",
            "se1-agent.exe",
            "a1-agent.exe"
          )

          foreach ($binary in $binaries) {
            $path = Join-Path "release" $binary
            $reported = & $path --print-version
            if ($LASTEXITCODE -ne 0) {
              throw "$binary failed to print its version"
            }

            $actual = "$reported".Trim()
            if ($actual -ne $version) {
              throw "$binary reported version '$actual' but expected '$version'"
            }
          }

      - name: Sign binaries (optional)
        shell: pwsh
        env:
          CERT_PFX_B64: ${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 }}
          CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:CERT_PFX_B64) -or [string]::IsNullOrWhiteSpace($env:CERT_PFX_PASSWORD)) {
            Write-Host "Signing secrets are not configured; skipping binary signing."
            exit 0
          }

          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if ([string]::IsNullOrWhiteSpace($signtool)) {
            throw "signtool.exe not found on runner"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_PFX_B64))

          Get-ChildItem -Path release -Filter *.exe | ForEach-Object {
            & $signtool sign /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 /f $certPath /p $env:CERT_PFX_PASSWORD $_.FullName
          }

      - name: Generate checksums and manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ steps.meta.outputs.tag_name }}"
          $version = "${{ steps.meta.outputs.version }}"

          $artifacts = Get-ChildItem -Path release -File | Sort-Object Name
          $checksums = @()
          $manifestArtifacts = @()

          foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Path $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $checksums += "$hash  $($artifact.Name)"
            $manifestArtifacts += [PSCustomObject]@{
              name = $artifact.Name
              size_bytes = $artifact.Length
              sha256 = $hash
            }
          }

          Set-Content -Path release/SHA256SUMS.txt -Value $checksums

          $manifest = [PSCustomObject]@{
            tag = $tag
            version = $version
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
            artifacts = $manifestArtifacts
          }

          $manifest | ConvertTo-Json -Depth 8 | Out-File -FilePath release/release-manifest.json -Encoding utf8NoBOM

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent-release
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    permissions:
      contents: write
    steps:
      - name: Download release artifact bundle
        uses: actions/download-artifact@v8
        with:
          name: windows-agent-release
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: Cordyceps ${{ needs.build.outputs.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/SHA256SUMS.txt
            release/release-manifest.json
