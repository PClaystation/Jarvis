name: CI

on:
  pull_request:
    paths:
      - "server/**"
      - "agent/**"
      - "t1/**"
      - "s1/**"
      - "e1/**"
      - "se1/**"
      - "a1/**"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - "agent/**"
      - "t1/**"
      - "s1/**"
      - "e1/**"
      - "se1/**"
      - "a1/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  go-modules:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [agent, t1, s1, e1, se1, a1]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
