name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  codeql-javascript:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Build server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  codeql-go:
    name: CodeQL (go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build Go modules
        shell: bash
        run: |
          set -euo pipefail
          for module in agent t1 s1 e1 se1 a1; do
            echo "::group::go test ${module}"
            (cd "${module}" && go test ./...)
            echo "::endgroup::"
          done

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  npm-audit:
    name: npm audit (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go modules
        shell: bash
        run: |
          set -euo pipefail
          GOVULNCHECK="$(go env GOPATH)/bin/govulncheck"
          for module in agent t1 s1 e1 se1 a1; do
            echo "::group::govulncheck ${module}"
            (cd "${module}" && "${GOVULNCHECK}" ./...)
            echo "::endgroup::"
          done

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
