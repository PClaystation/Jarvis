version: 2
updates:
  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - server
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: gomod
    directory: "/agent"
